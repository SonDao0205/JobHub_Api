spring.application.name=JobHub

# ==========================================
# CONFIG DATASOURCE (MySQL)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/JobHub?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123}

# CONFIG JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIG LOGGING
# ==========================================
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} -  %highlight(%-5level) - %cyan(%logger{50}) - %green(%msg%n)
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=30
logging.level.root=INFO
logging.level.ra.demo=INFO

# ==========================================
# CONFIG JWT
# ==========================================
jwt-secret=${JWT_SECRET:daylachuoibimatduocsudungdetaorajwt}
jwt-access-expiration-ms=${JWT_ACCESS_EXP:1800000}
jwt-refresh-expiration-ms=${JWT_REFRESH_EXP:604800000}

# ==========================================
# CONFIG CLOUDINARY
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_NAME:dq87endkv}
cloudinary.api-key=${CLOUDINARY_KEY:645829452264233}
cloudinary.api-secret=${CLOUDINARY_SECRET:De3C05xxcs7_3SUqFZEtZdKzmGQ}

# ==========================================
# CONFIG UPLOAD FILE
# ==========================================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ==========================================
# CONFIG REDIS
# ==========================================
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:123}
spring.data.redis.timeout=5000ms